<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tuki y la Religión 🕊️</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  :root{
    --sky:#3AC7E0; --sky-deep:#1E9FBF; --sun:#FFC93C; --sun-deep:#F5A623;
    --leaf:#4CAF6D; --leaf-deep:#2E9450; --coral:#FF6B5B; --coral-deep:#E8503F;
    --purple:#9B6BFF; --purple-deep:#7C4FE0; --cream:#FFF8EC; --ink:#2B2440;
    --white:#FFFFFF; --shadow: 0 8px 0 rgba(43,36,64,0.18);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{height:100%;}
  body{margin:0;font-family:'Nunito',sans-serif;background:linear-gradient(180deg,#5B8DEF 0%,#7BA8F0 55%,#CFF3E4 100%);min-height:100vh;color:var(--ink);overflow-x:hidden;position:relative;}
  h1,h2,h3,.display{font-family:'Fredoka',sans-serif;}
  .cloud{position:absolute;opacity:.9;z-index:0;pointer-events:none;}
  .hill{position:fixed;bottom:0;left:0;width:100%;z-index:0;pointer-events:none;}
  .screen{position:relative;z-index:2;min-height:100vh;display:none;flex-direction:column;align-items:center;padding:18px 14px 40px;}
  .screen.active{display:flex;}
  .topbar{width:100%;max-width:900px;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .backBtn{background:var(--white);border:none;border-radius:16px;padding:10px 16px;font-family:'Fredoka';font-weight:600;font-size:16px;color:var(--ink);box-shadow:var(--shadow);cursor:pointer;display:flex;align-items:center;gap:6px;}
  .backBtn:active{transform:translateY(4px);box-shadow:0 4px 0 rgba(43,36,64,0.18);}
  .starCounter{background:var(--white);border-radius:16px;padding:8px 16px;font-family:'Fredoka';font-weight:600;font-size:16px;box-shadow:var(--shadow);display:flex;align-items:center;gap:6px;}
  .musicBtn{position:fixed;top:14px;right:14px;z-index:10;background:var(--white);border:none;border-radius:50%;width:46px;height:46px;cursor:pointer;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;font-size:22px;transition:transform .1s ease;}
  .musicBtn:active{transform:translateY(3px);}
  .homeHeader{text-align:center;margin:6px 0 6px;}
  .homeHeader h1{font-size:clamp(28px,6vw,44px);color:var(--white);text-shadow:0 4px 0 rgba(43,36,64,0.25);margin:6px 0 2px;}
  .homeHeader p{color:var(--white);font-weight:800;font-size:clamp(14px,3vw,18px);margin:0;opacity:.95;}
  .mascotWrap{width:150px;margin:0 auto;}
  .menuGrid{display:grid;grid-template-columns:repeat(2,minmax(150px,1fr));gap:16px;width:100%;max-width:760px;margin-top:18px;}
  @media(min-width:620px){.menuGrid{grid-template-columns:repeat(3,minmax(150px,1fr));}}
  .card{border:none;cursor:pointer;border-radius:26px;padding:18px 12px 16px;display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--white);font-family:'Fredoka';font-weight:600;box-shadow:var(--shadow);transition:transform .08s ease;}
  .card:active{transform:translateY(4px);box-shadow:0 4px 0 rgba(43,36,64,0.18);}
  .card svg{width:64px;height:64px;}
  .card span{font-size:clamp(13px,3.2vw,16px);text-align:center;line-height:1.15;}
  .c1{background:linear-gradient(160deg,var(--coral),var(--coral-deep));}
  .c2{background:linear-gradient(160deg,var(--purple),var(--purple-deep));}
  .c3{background:linear-gradient(160deg,var(--leaf),var(--leaf-deep));}
  .c4{background:linear-gradient(160deg,var(--sun),var(--sun-deep));color:var(--ink);}
  .exWrap{width:100%;max-width:640px;background:var(--white);border-radius:28px;padding:22px 18px 26px;box-shadow:var(--shadow);margin-top:8px;text-align:center;}
  .progressBar{width:100%;height:14px;background:#EDEAF7;border-radius:10px;overflow:hidden;margin-bottom:16px;}
  .progressFill{height:100%;background:linear-gradient(90deg,var(--leaf),var(--sun));width:0%;transition:width .4s ease;}
  .exTitle{font-size:clamp(18px,4.5vw,24px);margin:0 0 4px;}
  .exSub{color:#6B6285;font-weight:700;margin:0 0 14px;font-size:clamp(13px,3vw,15px);}
  .stageBox{min-height:180px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;margin-bottom:14px;}
  .optionsRow{display:flex;flex-wrap:wrap;justify-content:center;gap:12px;}
  .optBtn{font-family:'Fredoka';font-weight:600;font-size:clamp(16px,4vw,20px);background:var(--cream);border:3px solid #EADFC5;border-radius:18px;min-width:64px;padding:12px 18px;cursor:pointer;color:var(--ink);max-width:90%;text-align:center;}
  .optBtn:active{transform:translateY(3px);}
  .optBtn.correct{background:var(--leaf);border-color:var(--leaf-deep);color:var(--white);}
  .optBtn.wrong{background:var(--coral);border-color:var(--coral-deep);color:var(--white);}
  .tfBtn{font-family:'Fredoka';font-weight:700;font-size:18px;width:110px;height:54px;border-radius:16px;border:3px solid #EADFC5;background:var(--cream);cursor:pointer;color:var(--ink);}
  .tfBtn:active{transform:translateY(3px);}
  .tfBtn.correct{background:var(--leaf);border-color:var(--leaf-deep);color:var(--white);}
  .tfBtn.wrong{background:var(--coral);border-color:var(--coral-deep);color:var(--white);}
  .questionCard{background:var(--cream);border:3px solid #EADFC5;border-radius:18px;padding:14px 16px;margin-bottom:10px;text-align:left;font-weight:700;font-size:clamp(14px,3.5vw,17px);line-height:1.5;color:var(--ink);width:100%;}
  .exImage{max-width:100%;max-height:220px;border-radius:18px;border:3px solid #EADFC5;object-fit:cover;margin-bottom:6px;box-shadow:0 4px 0 rgba(43,36,64,0.1);}
  .exImageWrap{display:flex;justify-content:center;margin-bottom:8px;}
  .exSvg{max-width:280px;max-height:180px;}
  .feedback{min-height:34px;font-family:'Fredoka';font-weight:700;font-size:18px;}
  .feedback.ok{color:var(--leaf-deep);}
  .feedback.bad{color:var(--coral-deep);}
  .continueBtn{display:none;margin-top:10px;font-family:'Fredoka';font-weight:700;font-size:18px;background:var(--sun);border:none;border-radius:16px;padding:12px 26px;box-shadow:0 5px 0 var(--sun-deep);cursor:pointer;color:var(--ink);}
  .endWrap{text-align:center;}
  .endWrap h2{font-size:clamp(22px,5vw,30px);}
  .endWrap p{font-weight:700;color:#6B6285;}
  .primaryBtn{font-family:'Fredoka';font-weight:700;font-size:18px;color:var(--white);background:linear-gradient(160deg,var(--leaf),var(--leaf-deep));border:none;border-radius:18px;padding:14px 28px;margin-top:14px;cursor:pointer;box-shadow:0 6px 0 var(--leaf-deep);}
  .confetti-piece{position:fixed;top:-20px;width:10px;height:14px;z-index:50;pointer-events:none;animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(105vh) rotate(400deg);opacity:0.9;}}
  @media(max-width:380px){.card svg{width:52px;height:52px;}.exWrap{padding:16px 10px 20px;}}
</style>
</head>

<script>
/* MASCOT SVG */
const mascotSVG=`<svg viewBox="0 0 160 160" width="100%"><ellipse cx="80" cy="145" rx="34" ry="8" fill="rgba(43,36,64,0.15)"/><path d="M50 90 Q40 60 62 45 Q80 34 98 45 Q120 60 110 90 Q112 120 80 128 Q48 120 50 90 Z" fill="#2B2440"/><path d="M56 85 Q50 62 66 50 Q80 42 94 50 Q110 62 104 85 Q106 110 80 116 Q54 110 56 85 Z" fill="#4CAF6D"/><circle cx="68" cy="66" r="7" fill="#fff"/><circle cx="70" cy="66" r="3.4" fill="#2B2440"/><path d="M78 74 Q100 70 118 78 Q100 86 78 82 Z" fill="#FFC93C"/><path d="M60 108 Q80 118 100 108 Q100 122 80 126 Q60 122 60 108 Z" fill="#FF6B5B"/><path d="M40 92 Q22 88 20 70 Q34 76 44 88 Z" fill="#3AC7E0"/><path d="M120 92 Q138 88 140 70 Q126 76 116 88 Z" fill="#3AC7E0"/></svg>`;
document.getElementById('mascotHome').innerHTML=mascotSVG;
document.getElementById('mascotEnd').innerHTML=mascotSVG;

/* AUDIO */
let audioCtx=null;
function ctx(){if(!audioCtx){audioCtx=new(window.AudioContext||window.webkitAudioContext)();}return audioCtx;}
function tone(f,s,d,t='sine',g=0.18){const c=ctx();const o=c.createOscillator();const gn=c.createGain();o.type=t;o.frequency.value=f;gn.gain.value=g;o.connect(gn);gn.connect(c.destination);o.start(c.currentTime+s);gn.gain.setValueAtTime(g,c.currentTime+s);gn.gain.exponentialRampToValueAtTime(0.001,c.currentTime+s+d);o.stop(c.currentTime+s+d+0.02);}
function playCorrect(){tone(523,0,0.12);tone(659,0.1,0.12);tone(784,0.2,0.22);}
function playWrong(){tone(220,0,0.18,'sawtooth',0.12);tone(160,0.15,0.25,'sawtooth',0.12);}
function playTap(){tone(400,0,0.06,'triangle',0.08);}
function playWin(){tone(523,0,0.12);tone(659,0.12,0.12);tone(784,0.24,0.12);tone(1046,0.36,0.3);}

/* TEXT-TO-SPEECH */
var _ttsSpinStyle=document.createElement('style');_ttsSpinStyle.textContent='@keyframes _spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}._ttsSpin{animation:_spin 0.8s linear infinite;display:inline-block}';document.head.appendChild(_ttsSpinStyle);
var _ttsVoices=[];
function _loadTtsVoices(){if('speechSynthesis' in window){_ttsVoices=window.speechSynthesis.getVoices();}}
if('speechSynthesis' in window){_loadTtsVoices();window.speechSynthesis.onvoiceschanged=_loadTtsVoices;}
function _findTtsVoice(lang){
  var l=(lang||'es-ES').toLowerCase();
  var prefix=l.split('-')[0];
  if('speechSynthesis' in window){var fresh=window.speechSynthesis.getVoices();if(fresh.length>0)_ttsVoices=fresh;}
  var voices=_ttsVoices;
  for(var i=0;i<voices.length;i++){if(voices[i].lang&&voices[i].lang.toLowerCase()===l)return voices[i];}
  for(var i=0;i<voices.length;i++){if(voices[i].lang&&voices[i].lang.toLowerCase().indexOf(prefix)===0)return voices[i];}
  for(var i=0;i<voices.length;i++){if(voices[i].lang&&voices[i].lang.toLowerCase().indexOf(prefix)>=0)return voices[i];}
  return null;
}
var _ttsWorker=null,_ttsSeq=0,_ttsJobs={};
function _getTtsWorker(){
  if(_ttsWorker)return _ttsWorker;
  var src='import{pipeline}from"https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.5.2";var m=null;async function M(){if(m)return m;m=await pipeline("text-to-speech","Xenova/mms-tts-spa",{dtype:"q8"});return m;}self.onmessage=async(e)=>{try{var s=await M();var o=await s(e.data.text);var f=o.audio instanceof Float32Array?o.audio:Float32Array.from(o.audio);var p=0;for(var i=0;i<f.length;i++){var a=Math.abs(f[i]);if(a>p)p=a;}if(p>0.02&&p<0.98){var g=0.92/p;for(var i=0;i<f.length;i++)f[i]*=g;}self.postMessage({id:e.data.id,samples:f,sr:o.sampling_rate||16000},[f.buffer]);}catch(err){self.postMessage({id:e.data.id,error:(err&&err.message)||String(err)});}};';
  var url=URL.createObjectURL(new Blob([src],{type:"text/javascript"}));
  _ttsWorker=new Worker(url,{type:"module"});
  _ttsWorker.onmessage=function(e){var cb=_ttsJobs[e.data.id];if(!cb)return;delete _ttsJobs[e.data.id];if(e.data.error)cb.reject(new Error(e.data.error));else cb.resolve({samples:e.data.samples,sr:e.data.sr});};
  _ttsWorker.onerror=function(){for(var k in _ttsJobs){_ttsJobs[k].reject(new Error("worker error"));}_ttsJobs={};};
  return _ttsWorker;
}
function _speakMMS(text){
  return new Promise(function(resolve,reject){
    var id=++_ttsSeq;
    _ttsJobs[id]={resolve:resolve,reject:reject};
    _getTtsWorker().postMessage({id:id,text:text});
  });
}
var _mmsAudioCtx=null,_ttsCache={};
function speak(text,lang,btn){
  var l=lang||'es-ES';
  if(!text||!text.length)return;
  var prefix=l.split('-')[0];
  var origIcon='';
  if(btn){origIcon=btn.textContent;btn.textContent='\u23F3';btn.classList.add('_ttsSpin');btn.disabled=true;}
  function _btnDone(ok){if(!btn)return;btn.classList.remove('_ttsSpin');btn.disabled=false;if(ok){btn.textContent=origIcon;}else{btn.textContent='\u274C';setTimeout(function(){btn.textContent=origIcon;},2000);}}
  /* CACHE CHECK - play instantly if already loaded */
  if(_ttsCache[text]){var cached=_ttsCache[text];_btnDone(true);if(cached.audio){cached.audio.currentTime=0;cached.audio.play().catch(function(){});return;}if(cached.samples){if(!_mmsAudioCtx)_mmsAudioCtx=new(window.AudioContext||window.webkitAudioContext)();if(_mmsAudioCtx.state==='suspended')_mmsAudioCtx.resume();var buf=_mmsAudioCtx.createBuffer(1,cached.samples.length,cached.sr);if(buf.copyToChannel)buf.copyToChannel(cached.samples,0);else buf.getChannelData(0).set(cached.samples);var src=_mmsAudioCtx.createBufferSource();src.buffer=buf;src.connect(_mmsAudioCtx.destination);src.start();return;}}
  if('speechSynthesis' in window){
    window.speechSynthesis.cancel();
    var voice=_findTtsVoice(l);
    if(voice){
      var u=new SpeechSynthesisUtterance(text);
      u.lang=l;u.rate=0.9;u.voice=voice;
      u.onend=function(){_btnDone(true);};
      u.onerror=function(){_btnDone(false);};
      window.speechSynthesis.speak(u);
      return;
    }
  }
  var done=false;
  var timeout=setTimeout(function(){if(!done){done=true;_btnDone(false);}},15000);
  function _finish(ok){if(done)return;done=true;clearTimeout(timeout);_btnDone(ok);}
  function _ttsFallback(){if(done)return;_finish(false);if('speechSynthesis' in window){var u=new SpeechSynthesisUtterance(text);u.lang=l;u.rate=0.9;var v=_findTtsVoice(l);if(v)u.voice=v;window.speechSynthesis.speak(u);}}
  var ttsUrl='https://translate.google.com/translate_tts?ie=UTF-8&tl='+prefix+'&client=tw-ob&q='+encodeURIComponent(text);
  var audio=new Audio(ttsUrl);
  _ttsCache[text]={audio:audio};
  audio.onerror=function(){};
  audio.play().then(function(){_finish(true);}).catch(function(){});
  _speakMMS(text).then(function(out){
    if(done)return;
    _finish(true);
    var samples=out.samples,sr=out.sr;
    _ttsCache[text]={samples:samples,sr:sr};
    if(!_mmsAudioCtx)_mmsAudioCtx=new(window.AudioContext||window.webkitAudioContext)();
    if(_mmsAudioCtx.state==='suspended')_mmsAudioCtx.resume();
    var buf=_mmsAudioCtx.createBuffer(1,samples.length,sr);
    if(buf.copyToChannel)buf.copyToChannel(samples,0);else buf.getChannelData(0).set(samples);
    var src=_mmsAudioCtx.createBufferSource();
    src.buffer=buf;src.connect(_mmsAudioCtx.destination);
    src.start();
  }).catch(function(){_ttsFallback();});
  if('speechSynthesis' in window){
    function _ttsRetry(){
      if(done)return;
      var v=_findTtsVoice(l);
      if(v){
        _finish(true);
        window.speechSynthesis.cancel();
        var u=new SpeechSynthesisUtterance(text);
        u.lang=l;u.rate=0.9;u.voice=v;
        window.speechSynthesis.speak(u);
      }
    }
    setTimeout(_ttsRetry,150);
    setTimeout(_ttsRetry,400);
  }
}

function _preloadTTS(){
  var bar=document.createElement('div');
  bar.style.cssText='position:fixed;top:0;left:0;right:0;z-index:9999;background:#1a1a2e;color:#fff;text-align:center;padding:6px;font-size:13px;font-family:sans-serif;';
  var fill=document.createElement('div');
  fill.style.cssText='height:3px;background:#4CAF50;width:0%;transition:width .2s;';
  bar.innerHTML='<span id="_ptxt">Loading audio 0%</span>';
  bar.appendChild(fill);
  document.body.insertBefore(bar,document.body.firstChild);
  var total=_allTexts.length,done=0;
  var timer=setInterval(function(){
    var pct=Math.round((done/total)*100);
    fill.style.width=pct+'%';
    document.getElementById('_ptxt').textContent='Loading audio '+pct+'% ('+done+'/'+total+')';
    if(done>=total){clearInterval(timer);setTimeout(function(){bar.style.opacity='0';bar.style.transition='opacity .4s';setTimeout(function(){bar.remove();},400);},500);}
  },200);
  _allTexts.forEach(function(text,i){
    setTimeout(function(){
      var url='https://translate.google.com/translate_tts?ie=UTF-8&tl=es&client=tw-ob&q='+encodeURIComponent(text);
      var a=new Audio(url);
      a.preload='auto';
      a.oncanplaythrough=function(){done++;};
      a.onerror=function(){done++;};
      _ttsCache[text]={audio:a};
      a.load();
    },i*100);
  });
  setTimeout(function(){done=total;},30000);
}

/* NAVIGATION */
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function goHome(){showScreen('screen-home');}
function startTopic(t){currentTopic=t;qIndex=0;document.getElementById('exTitle').textContent=TOPIC_META[t].title;document.getElementById('exSub').textContent=TOPIC_META[t].sub;showScreen('screen-exercise');loadQuestion();}
function updateProgress(){document.getElementById('progressFill').style.width=(qIndex/TOTAL_Q*100)+'%';}
function loadQuestion(){questionAnswered=false;updateProgress();document.getElementById('feedback').textContent='';document.getElementById('feedback').className='feedback';document.getElementById('continueBtn').style.display='none';const s=document.getElementById('stageBox');s.innerHTML='';if(qIndex>=TOTAL_Q){return endGame();}const builders={sagradaFamilia:buildSagradaFamilia,eucaristia:buildEucaristia,josemaria:buildJosemaria,pedroPablo:buildPedroPablo};builders[currentTopic](s);}
function nextQuestion(){qIndex++;loadQuestion();}
function markResult(ok,el){if(questionAnswered)return;questionAnswered=true;const fb=document.getElementById('feedback');if(ok){stars++;document.getElementById('starCount').textContent=stars;fb.textContent='¡Muy bien, lo lograste! 🎉';fb.className='feedback ok';playCorrect();confettiBurst();if(el)el.classList.add('correct');}else{fb.textContent='Casi... ¡vuelve a intentarlo! 💪';fb.className='feedback bad';playWrong();if(el)el.classList.add('wrong');}document.getElementById('continueBtn').style.display='inline-block';}
function endGame(){showScreen('screen-end');playWin();confettiBurst();const t=document.getElementById('endTitle'),m=document.getElementById('endMsg');if(stars>=TOTAL_Q*4/5){t.textContent='¡Eres un campeón de la fe! 🏆';}else if(stars>=TOTAL_Q/2){t.textContent='¡Buen trabajo! Sigue aprendiendo 🌟';}else{t.textContent='¡Lo intentaste con ganas! 🕊️';}m.textContent=`Ganaste ${stars} estrellas en total.`;}

/* MULTIPLE CHOICE */
function buildMultipleChoice(stage,q,opt,correct){
  const card=document.createElement('div');card.className='questionCard';
  const txt=document.createElement('span');txt.textContent='📖 '+q;
  const btn=document.createElement('button');btn.style.cssText='background:none;border:none;cursor:pointer;font-size:20px;vertical-align:middle;';btn.textContent='🔊';btn.title='Escuchar';
  btn.onclick=function(){speak(q,'es-ES',btn);};
  card.appendChild(txt);card.appendChild(btn);stage.appendChild(card);
  const row=document.createElement('div');row.className='optionsRow';
  shuffle(opt.map((o,i)=>({text:o,correct:i===correct}))).forEach(item=>{
    const b=document.createElement('button');b.className='optBtn';b.textContent=item.text;
    b.onclick=()=>{playTap();markResult(item.correct,b);if(!item.correct){[...row.children].find(c=>c.textContent===opt[correct]).classList.add('correct');}[...row.children].forEach(c=>c.disabled=true);};
    row.appendChild(b);
  });
  stage.appendChild(row);
}

/* TRUE/FALSE */
function buildTrueFalse(stage,q,correct){
  const card=document.createElement('div');card.className='questionCard';
  const txt=document.createElement('span');txt.textContent='📖 '+q;
  const btn=document.createElement('button');btn.style.cssText='background:none;border:none;cursor:pointer;font-size:20px;vertical-align:middle;';btn.textContent='🔊';btn.title='Escuchar';
  btn.onclick=function(){speak(q,'es-ES',btn);};
  card.appendChild(txt);card.appendChild(btn);stage.appendChild(card);
  const row=document.createElement('div');row.className='optionsRow';
  [{t:'Verdadero ✅',v:true},{t:'Falso ❌',v:false}].forEach(item=>{
    const b=document.createElement('button');b.className='tfBtn';b.textContent=item.t;
    b.onclick=()=>{playTap();markResult(item.v===correct,b);if(item.v!==correct){[...row.children].find(c=>c.textContent.includes(correct?'Verdadero':'Falso')).classList.add('correct');}[...row.children].forEach(c=>c.disabled=true);};
    row.appendChild(b);
  });
  stage.appendChild(row);
}
